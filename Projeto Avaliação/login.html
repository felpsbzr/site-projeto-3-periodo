<!DOCTYPE html>
<html lang="pt-br"> 

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body class="login-body">
    <div class="login-container">
        <img src="imgs/Logo.jpeg" alt="Imagem com fundo branco com os dizeres B5 de forma estilizada e Base 5 em azul e automações em preto" class="logo-login-cadastro">
        <div class="login-card">
            <form action="home_page.html" method="get">
                <h1>Login</h1>

                <div class="campo">
                    <label for="email">E-Mail</label>
                    <input type="email" name="email" id="email" placeholder="Digite seu e-mail" required>
                </div>

                <div class="campo">
                <   label for="senha">Senha</label>
                    <input type="password" name="senha" id="senha" placeholder="Digite sua senha" required>
                </div>

                <div class="login-botao">
                    <button type="submit">Entrar</button>
                </div>

            </form>

            <p>
                Não tem conta? <a href="cadastro.html">Cadastre-se</a>
            </p>
        </div>
    </div>
</body>

</html>
